name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nevo_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nevo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/nevo_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/nevo_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy

      - name: Migrate
        run: alembic upgrade head

      - name: Test
        run: pytest --cov=nevo --cov-report=term-missing

      - name: Verify downgrade
        run: alembic downgrade base
