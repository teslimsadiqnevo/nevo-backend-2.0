services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nevo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nevo"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - nevo_postgres_data:/var/lib/postgresql/data

volumes:
  nevo_postgres_data:
